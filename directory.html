<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Directory — Artispreneur</title>
<meta name="description" content="183 music industry contacts — venues, radio, blogs, press, podcasts, community resources.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--black:#09090b;--surface:#18181b;--card:#1c1c1f;--border:#27272a;--text:#fafafa;--text-muted:#a1a1aa;--text-dim:#71717a;--gold:#c9a227;--gold-light:#e8c84a;--gold-muted:rgba(201,162,39,0.12)}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--black);color:var(--text);line-height:1.5}
a{color:var(--gold);text-decoration:none}
.container{max-width:1200px;margin:0 auto;padding:0 24px}
.navbar{position:fixed;top:0;left:0;right:0;z-index:100;padding:0 24px;background:rgba(9,9,11,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
.navbar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:60px}
.nav-links{display:flex;gap:22px;align-items:center}
.nav-links a{color:var(--text-muted);font-size:13px;font-weight:500;white-space:nowrap}
.nav-links a:hover,.nav-links .active{color:var(--gold)}
main{padding-top:100px;padding-bottom:60px}
.header{text-align:center;margin-bottom:36px}
.header h1{font-family:'Playfair Display',serif;font-size:clamp(28px,3.5vw,44px);font-weight:900}
.header p{font-size:14px;color:var(--text-muted);margin-top:6px}
.toolbar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:180px;padding:10px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif}
.search-box:focus{outline:none;border-color:var(--gold)}
.filter-chip{font-size:11px;padding:5px 12px;border-radius:100px;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;transition:all .1s;font-family:'Inter',sans-serif;white-space:nowrap}
.filter-chip:hover,.filter-chip.on{background:var(--gold-muted);border-color:var(--gold);color:var(--gold)}
.stats{font-size:12px;color:var(--text-dim);margin-left:auto}
.contact-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.contact-grid.list{grid-template-columns:1fr}
.contact-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px;transition:all .15s}
.contact-card:hover{border-color:var(--gold);background:var(--card)}
.contact-card.hidden{display:none}
.contact-name{font-size:14px;font-weight:700;margin-bottom:3px}
.contact-section{font-size:10px;color:var(--text-dim);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.contact-loc{font-size:12px;color:var(--text-dim)}
.contact-genre{font-size:11px;color:var(--gold);margin-top:4px}
.contact-tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tag{font-size:9px;padding:2px 7px;border-radius:4px;background:var(--card);color:var(--text-dim);text-transform:uppercase}
.contact-notes{font-size:11px;color:var(--text-dim);margin-top:6px;line-height:1.4}
.contact-link{font-size:11px;font-weight:600;display:inline-block;margin-top:8px}
.pagination{display:flex;justify-content:center;gap:6px;margin-top:28px}
.page-btn{padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--text-muted);cursor:pointer;font-family:'Inter',sans-serif}
.page-btn.on{background:var(--gold);color:var(--black);border-color:var(--gold)}
footer{border-top:1px solid var(--border);padding:28px 0;margin-top:40px;text-align:center;font-size:12px;color:var(--text-dim)}
@media(max-width:1024px){.contact-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.contact-grid{grid-template-columns:repeat(2,1fr)}.nav-links{display:none}}
@media(max-width:480px){.contact-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<nav class="navbar">
  <div class="navbar-inner">
    <a href="index.html" class="nav-logo"><img src="logo.png" alt="Artispreneur" style="height:22px;display:block"></a><span style="font-family:'Playfair Display',serif;font-size:15px;font-weight:800;letter-spacing:-.3px;margin-left:8px;color:var(--text)">Artis<span style="color:var(--gold)">preneur</span></span>
    <div class="nav-links">
      <a href="workspace.html">Rostr Agent</a>
      <a href="academy.html">Academy</a>
      <a href="pricing.html">Pricing</a>
      <a href="login.html">Login</a>
      <a href="signup.html" class="nav-cta">Get Started Free</a>
    </div>
  </div>
</nav>

<main class="container">
  <div class="header">
    <h1>Industry Directory</h1>
    <p id="headerCount">Loading contacts…</p>
  </div>

  <div class="toolbar">
    <input type="text" class="search-box" placeholder="Search by name, location, or genre..." oninput="applyFilters()" id="search">
    <span class="stats" id="stats"></span>
    <button class="filter-chip on" onclick="filterCat('all',this)">All</button>
  </div>
  <div class="contact-grid" id="contactGrid"></div>
  <div class="pagination" id="pagination"></div>
</main>

<footer><p>&copy; 2026 Artispreneur · Directory ingestion agent · <span id="footerCount"></span></p></footer>

<script src="directory-data.js"></script>
<script>
const allContacts = DIRECTORY_DATA || [];
document.getElementById('headerCount').textContent = allContacts.length + ' contacts across ' + (new Set(allContacts.map(c=>c.cat))).size + ' categories';
document.getElementById('footerCount').textContent = allContacts.length + ' contacts';

// Build category filters
const cats = ['all',...new Set(allContacts.map(c=>c.cat))];
cats.slice(1).forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-chip';
  btn.textContent = cat;
  btn.onclick = function() { filterCat(cat, this); };
  document.querySelector('.toolbar').insertBefore(btn, document.getElementById('stats'));
});

let currentCat='all', currentPage=1, perPage=20;

function renderContacts(filtered) {
  document.getElementById('contactGrid').innerHTML = filtered.map(c => `
    <div class="contact-card" data-search="${c.name} ${c.location||''} ${c.genre||''} ${(c.tags||[]).join(' ')}">
      <div class="contact-section">${c.cat} · ${c.section||''}</div>
      <div class="contact-name">${c.name}</div>
      ${c.location?`<div class="contact-loc">${c.location}</div>`:''}
      ${c.genre?`<div class="contact-genre">${c.genre}</div>`:''}
      ${c.tags&&c.tags.length?`<div class="contact-tags">${c.tags.map(t=>`<span class="tag">${t}</span>`).join('')}</div>`:''}
      ${c.notes?`<div class="contact-notes">${c.notes}</div>`:''}
      ${c.url?`<a href="${c.url}" target="_blank" class="contact-link">Visit →</a>`:''}
    </div>
  `).join('');
}

function applyFilters() {
  const q = (document.getElementById('search').value||'').toLowerCase();
  let visible = allContacts.filter(c => {
    if (currentCat !== 'all' && c.cat !== currentCat) return false;
    if (!q) return true;
    return (c.name+c.location+c.genre+(c.tags||[]).join(' ')).toLowerCase().includes(q);
  });
  document.getElementById('stats').textContent = 'Showing '+visible.length+' of '+allContacts.length;
  currentPage = 1;
  renderPagination(visible);
}

function filterCat(cat, btn) {
  document.querySelectorAll('.filter-chip').forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  currentCat = cat;
  applyFilters();
}

function renderPagination(contacts) {
  const pages = Math.ceil(contacts.length/perPage);
  document.getElementById('pagination').innerHTML = '';
  if (pages <= 1) { renderContacts(contacts); return; }
  for (let i=1; i<=pages; i++) {
    const btn = document.createElement('button');
    btn.className = 'page-btn'+(i===1?' on':'');
    btn.textContent = i;
    btn.onclick = function() {
      currentPage = i;
      document.querySelectorAll('.page-btn').forEach(b => b.classList.toggle('on', b===btn));
      const slice = contacts.slice((i-1)*perPage, i*perPage);
      renderContacts(slice);
    };
    document.getElementById('pagination').appendChild(btn);
  }
  renderContacts(contacts.slice(0, perPage));
}

applyFilters();
</script>
</body>
</html>
