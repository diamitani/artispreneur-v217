<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Login — Artispreneur</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet">
<style>
:root{--black:#09090b;--surface:#18181b;--card:#1c1c1f;--border:#27272a;--text:#fafafa;--text-muted:#a1a1aa;--text-dim:#71717a;--gold:#c9a227;--gold-light:#e0b832}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-font-smoothing:antialiased}
body{font-family:'Inter',-apple-system,sans-serif;background:var(--black);color:var(--text);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
a{color:var(--gold);text-decoration:none}
.card{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:40px;max-width:420px;width:100%;text-align:center}
.card img{height:28px;margin-bottom:20px}
.card h1{font-family:'Playfair Display',serif;font-size:24px;font-weight:900;margin-bottom:4px}
.card p{font-size:13px;color:var(--text-muted);margin-bottom:28px}
.form-group{margin-bottom:16px;text-align:left}
.form-group label{display:block;font-size:12px;font-weight:600;color:var(--text-muted);margin-bottom:5px}
.form-group input{width:100%;padding:12px 14px;background:var(--black);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:'Inter',sans-serif}
.form-group input:focus{outline:none;border-color:var(--gold)}
.btn{display:flex;align-items:center;justify-content:center;gap:6px;width:100%;padding:13px;border-radius:10px;font-weight:700;font-size:14px;border:none;cursor:pointer;font-family:'Inter',sans-serif}
.btn-gold{background:var(--gold);color:var(--black)}.btn-gold:hover{background:var(--gold-light)}
.links{display:flex;justify-content:center;gap:16px;margin-top:20px;font-size:12px;color:var(--text-dim)}
.links a{color:var(--text-dim)}.links a:hover{color:var(--gold)}
.back{text-align:center;margin-top:20px;font-size:13px;color:var(--text-dim)}
.back a{color:var(--text-dim)}.back a:hover{color:var(--gold)}
</style>
</head>
<body>
<div>
  <div class="card">
    <a href="index.html"><img src="logo.png" alt="Artispreneur"></a>
    <h1>Welcome back</h1>
    <p>Sign into your workspace.</p>
    <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="you@email.com"></div>
    <div class="form-group"><label>Password</label><input type="password" id="password" placeholder="Your password" onkeydown="if(event.key==='Enter')doLogin()"></div>
    <button class="btn btn-gold" onclick="doLogin()">Sign In →</button>
    <div class="links"><a href="signup.html">Create account</a><span>·</span><a href="#">Forgot password?</a></div>
  </div>
  <div class="back"><a href="index.html">← Back to Artispreneur</a></div>
</div>
<script>
function doLogin(){const e=document.getElementById('email').value.trim(),p=document.getElementById('password').value.trim();if(!e||!p||p.length<8)return alert('Invalid credentials');window.location.href='https://artispreneur-landing.vercel.app/workspace.html'}
</script>
</body>
</html>
